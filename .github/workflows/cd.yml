name: Omni One CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build-and-push-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/omni-one-frontend
            ${{ secrets.DOCKERHUB_USERNAME }}/omni-one-backend

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/omni-one-frontend:latest,${{ secrets.DOCKERHUB_USERNAME }}/omni-one-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/omni-one-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/omni-one-frontend:buildcache,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/omni-one-backend:latest,${{ secrets.DOCKERHUB_USERNAME }}/omni-one-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/omni-one-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/omni-one-backend:buildcache,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Copy docker-compose files via scp
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf,nginx/frontend.conf"
          target: "/opt/omni-one"
          
      - name: Execute deployment script via ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/omni-one
            # Pull latest images
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/omni-one-frontend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/omni-one-backend:latest
            # Restart services
            docker-compose up -d --remove-orphans
            # Run Prisma migrations if needed
            docker-compose exec -T backend pnpm dlx prisma migrate deploy
            # Prune old images
            docker image prune -f
